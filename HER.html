<!DOCTYPE html>
<html>

<head>
    <title>Welcome Baacha 💖</title>

    <!-- Cute Font -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            background: linear-gradient(135deg, #ffd6e7, #ffc2d1, #ffe5ec);
            font-family: Arial, sans-serif;
        }

        /* Main Welcome Text */
        .welcome-text {
            font-size: 80px;
            font-family: 'Pacifico', cursive;
            color: #ff4f87;
            text-shadow: 0 5px 15px rgba(255, 105, 180, 0.5);
            animation: bounce 1.5s infinite;
        }

        /* Jump Animation */
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-25px);
            }
        }

        /* Small Text */
        .sub-text {
            margin-top: 10px;
            font-size: 22px;
            color: #ff6f91;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Button */
        button {
            margin-top: 35px;
            padding: 15px 35px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #ff4f87;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
        }

        /* Floating Hearts */
        .heart {
            position: absolute;
            color: pink;
            font-size: 25px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh);
                opacity: 1;
            }

            100% {
                transform: translateY(-120px);
                opacity: 0;
            }
        }

    </style>
</head>

<body>

    <h1 class="welcome-text">
        WELCOME BAACHA 💖
    </h1>

    <p class="sub-text">
        Something special is waiting for you ✨
    </p>

    <button onclick="showMessage()">
        ENTER ❤️
    </button>

    <script>

        // Button Click
        function showMessage() {
            alert("Welcome My Baacha 💖");
        }

        // Floating Hearts
        setInterval(() => {

            let heart = document.createElement("div");

            heart.className = "heart";

            heart.innerHTML = "💖";

            heart.style.left = Math.random() * 100 + "vw";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);

        }, 300);

    </script>

</body>

</html>
