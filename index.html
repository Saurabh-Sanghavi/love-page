<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>
<style>
body {
    margin: 0;
    text-align: center;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    color: white;
    overflow: hidden;
    position: relative;
}

/* Cute floating decorations */
.decoration {
    position: fixed;
    font-size: 22px;
    opacity: 0.7;
    animation: floatUp 8s linear infinite;
    z-index: -1;
    pointer-events: none;
}

@keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); }
    100% { transform: translateY(-100px) rotate(360deg); }
}

/* Smooth fade */
.fade {
    animation: fadeIn 1s;
}
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    background: white;
    color: #ff69b4;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
}

h2 {
    font-size: 28px;
}

/* Big bold love text */
.big-love {
    font-size: 34px;
    font-weight: bold;
    font-family: 'Georgia', serif;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
    margin: 25px 0;
    color: #fff;
}

/* Slideshow */
.slideshow-container {
    max-width: 340px;
    margin: 25px auto;
    position: relative;
}
.mySlides {
    display: none;
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    padding: 12px;
    background: linear-gradient(145deg, #ffe4f0, #ffb6d9);
    border: 6px solid #fff;
}
.mySlides img {
    width: 100%;
    border-radius: 15px;
    display: block;
}
/* Text under the image */
.slide-text {
    margin: 18px auto 20px;
    padding: 14px 22px;
    background: rgba(255,255,255,0.25);
    border-radius: 25px;
    font-size: 17px;
    font-weight: bold;
    min-height: 28px;
    max-width: 300px;
    color: #fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* Love Letter with Black Border Effect (like your "Summer" example) */
#typing {
    margin: 45px auto;
    max-width: 310px;
    padding: 20px 25px;
    
    border: none;
    font-size: 17px;
    line-height: 1.6;
    text-align: left;
    color: #fff;
   
    -webkit-text-stroke: 1.5px #000;   /* Black outline */
    text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<!-- Floating Hello Kitty & Bows -->
<div id="decorations"></div>

<!-- STEP 1 -->
<div id="step1" class="fade">
    <h2>Put your name 💌</h2>
    <p>Hint: The name I call you daily ❤️</p>
    <input type="text" id="nameInput" style="padding:10px; font-size:16px; width:200px;">
    <br><br>
    <button onclick="checkName()">Next</button>
    <p id="error" style="color:yellow; font-weight:bold;"></p>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden fade">
    <h2>Do you love me? ❤️</h2>
    <button onclick="yes()">YES</button>
    <button id="noBtn">NO</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="hidden fade">
    <h2>Select your gift 🎁</h2>
    <button onclick="gift1()">GIFT 1 - YOU</button>
    <button onclick="gift2()">GIFT 2 - Song</button>
    <button onclick="gift3()">GIFT 3 - Love Letter</button>
</div>

<!-- GIFT 1 - YOU -->
<div id="gift1" class="hidden fade">
    <h2>YOU ❤️</h2>
    
    <div class="slideshow-container">
        <div class="mySlides">
            <img src="https://8upload.com/image/c82c45aa1b0a0c54/1775055547953.jpg" style="width:100%">
        </div>
        <div class="mySlides">
            <img src="https://8upload.com/image/4e689141049dc6fa/1775055547977.jpg" style="width:100%">
        </div>
        <div class="mySlides">
            <img src="https://8upload.com/image/81c435c9329f5413/1775055548002.jpg" style="width:100%">
        </div>
        <div class="mySlides">
            <img src="https://8upload.com/image/b71327cec59ff77b/1775055548027.jpg" style="width:100%">
        </div>
    </div>

    <div class="slide-text" id="slideTyping"></div>

    <p class="big-love">I Love You Forever 💖</p>
    <button onclick="back()">Back</button>
</div>

<!-- GIFT 2 - Song -->
<div id="gift2" class="hidden fade">
    <h2>🎵 Special Song for You 🎵</h2>
    <iframe width="300" height="200" 
    src="https://www.youtube.com/embed/2Vv-BfVoq4g" 
    allowfullscreen></iframe>
    <br><br>
    <button onclick="back()">Back</button>
</div>

<!-- GIFT 3 - Love Letter -->
<div id="gift3" class="hidden fade">
    <h2>💌 A Letter For My Baacha 💌</h2>
    <div id="typing"></div>
    <p class="big-love">I Love You Forever 💖</p>
    <button onclick="back()">Back</button>
</div>

<script>
// Background Music, decorations, name check, yes/no, slideshow, etc. (unchanged)
var bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.35;
bgMusic.play().catch(() => {});

function createDecorations() {
    const decors = ['🐱', '🎀', '💕', '🎀', '🐱', '💗'];
    setInterval(() => {
        let decor = document.createElement("div");
        decor.className = "decoration";
        decor.innerHTML = decors[Math.floor(Math.random()*decors.length)];
        decor.style.left = Math.random() * 100 + "vw";
        decor.style.animationDuration = (Math.random() * 6 + 8) + "s";
        document.getElementById("decorations").appendChild(decor);
        setTimeout(() => decor.remove(), 16000);
    }, 350);
}
createDecorations();

function checkName() {
    let name = document.getElementById("nameInput").value.toLowerCase().trim();
    if(name === "baacha") {
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
    } else {
        document.getElementById("error").innerText = "Not Accepted 😢 Please try again 💕";
    }
}

function yes() {
    document.getElementById("step2").style.display = "none";
    document.getElementById("step3").style.display = "block";
}

const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * 75 + "%";
    noBtn.style.top = Math.random() * 65 + "%";
});

function gift1() {
    document.getElementById("step3").style.display = "none";
    document.getElementById("gift1").style.display = "block";
    startSlideshow();
}

function gift2() {
    document.getElementById("step3").style.display = "none";
    document.getElementById("gift2").style.display = "block";
}

function gift3() {
    document.getElementById("step3").style.display = "none";
    document.getElementById("gift3").style.display = "block";
    startTyping();
}

function back() {
    document.getElementById("gift1").style.display = "none";
    document.getElementById("gift2").style.display = "none";
    document.getElementById("gift3").style.display = "none";
    document.getElementById("step3").style.display = "block";
}

// Slideshow (unchanged)
const slideMessages = [
    "I GOT MY EYES ON YOU",      
    "YOUR SMILE IS MY FAVOURITE", 
    "I WILL ADORE YOU",          
    "YOU ARE MY BAACHA"          
];

let slideIndex = 0;
let typingTimeout = null;

function typeSlideText(text, element) {
    if (typingTimeout) clearTimeout(typingTimeout);
    element.innerHTML = "";
    let i = 0;
    const speed = 40;
    function type() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            typingTimeout = setTimeout(type, speed);
        }
    }
    type();
}

function startSlideshow() {
    let slides = document.getElementsByClassName("mySlides");
    let textElement = document.getElementById("slideTyping");
    for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex-1].style.display = "block";
    typeSlideText(slideMessages[slideIndex-1], textElement);
    setTimeout(startSlideshow, 5000);
}

// Final Love Letter
const loveLetter = `My dearest baacha,

From the moment you entered my life, everything became brighter and more beautiful.
You are not just my love, you are my peace, my happiness, and my favorite person in this entire world.

Every time I call you "baacha", my heart fills with warmth.
Your smile melts me completely, your voice makes my day better, and your presence makes me feel like the luckiest person alive.

I promise to always cherish you, support you, protect you, and love you with all my heart.
Even on tough days, I will choose you again and again.
You make ordinary moments feel magical.

Thank you for being my baacha and my forever love.
I can't wait to create thousands of more beautiful memories with you.

I love you more than words can ever express... today, tomorrow, and always.

"TU FAKT MAJHI AHES"

Forever yours,
HUSBAND ❤️`;

function startTyping() {
    const typingElement = document.getElementById("typing");
    typingElement.innerHTML = "";
    let i = 0;
    const speed = 45;
    function type() {
        if (i < loveLetter.length) {
            typingElement.innerHTML += loveLetter.charAt(i) === "\n" ? "<br>" : loveLetter.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}

// Hide hidden sections
document.querySelectorAll('.hidden').forEach(el => el.style.display = "none");
</script>

</body>
</html>
