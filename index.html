<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>
<style>
body {
    margin: 0;
    text-align: center;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    color: white;
    overflow: hidden;
    position: relative;
}

/* Cute floating decorations */
.decoration {
    position: fixed;
    font-size: 22px;
    opacity: 0.7;
    animation: floatUp 8s linear infinite;
    z-index: -1;
    pointer-events: none;
}

@keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); }
    100% { transform: translateY(-100px) rotate(360deg); }
}

/* Smooth fade */
.fade {
    animation: fadeIn 1s;
}
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    background: white;
    color: #ff69b4;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
}

h2 {
    font-size: 28px;
}

/* Big bold love text */
.big-love {
    font-size: 34px;
    font-weight: bold;
    font-family: 'Georgia', serif;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
    margin: 25px 0;
    color: #fff;
}

/* Slideshow */
.slideshow-container {
    max-width: 320px;
    margin: 20px auto;
    position: relative;
    border-radius: 15px;
    overflow: hidden;
}
.mySlides {
    display: none;
    width: 100%;
}
.slide-text {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,105,180,0.7);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: bold;
}

/* Typing effect */
#typing {
    font-size: 20px;
    min-height: 140px;
    margin: 25px auto;
    max-width: 300px;
    white-space: pre-wrap;
    text-align: left;
    padding: 0 15px;
}
</style>
</head>

<body>

<!-- Floating Hello Kitty & Bows -->
<div id="decorations"></div>

<!-- STEP 1 -->
<div id="step1" class="fade">
    <h2>Put your name 💌</h2>
    <p>Hint: The name I call you daily ❤️</p>
    <input type="text" id="nameInput" style="padding:10px; font-size:16px; width:200px;">
    <br><br>
    <button onclick="checkName()">Next</button>
    <p id="error" style="color:yellow; font-weight:bold;"></p>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden fade">
    <h2>Do you love me? ❤️</h2>
    <button onclick="yes()">YES</button>
    <button id="noBtn">NO</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="hidden fade">
    <h2>Select your gift 🎁</h2>
    <button onclick="gift1()">GIFT 1 - Memories</button>
    <button onclick="gift2()">GIFT 2 - Song</button>
    <button onclick="gift3()">GIFT 3 - Love Letter</button>
</div>

<!-- GIFT 1 - Slideshow with your 4 photos -->
<div id="gift1" class="hidden fade">
    <h2>❤️ Our Beautiful Memories ❤️</h2>
    
    <div class="slideshow-container">
        <div class="mySlides"><img src="https://drive.google.com/uc?id=1pMHp0niCwDt_ZaaJu_ePpVaFeb8Rsb0l" style="width:100%"></div>
        <div class="mySlides"><img src="https://drive.google.com/uc?id=11DO-nU1lZTPOJ4KCcYVP4UzX3hknPIwN" style="width:100%"></div>
        <div class="mySlides"><img src="https://drive.google.com/uc?id=1VlGkEjS_wizwsavMRFtsuXGs4M3KaPwH" style="width:100%"></div>
        <div class="mySlides"><img src="https://drive.google.com/uc?id=19oShqYllaBb9W_Gwn7vVVb_Omobtq803" style="width:100%"></div>
        <div class="slide-text">My favorite moments with you 💕</div>
    </div>

    <p class="big-love">I Love You Forever 💖</p>
    <button onclick="back()">Back</button>
</div>

<!-- GIFT 2 - Song -->
<div id="gift2" class="hidden fade">
    <h2>🎵 Special Song for You 🎵</h2>
    <iframe width="300" height="200" 
    src="https://www.youtube.com/embed/2Vv-BfVoq4g" 
    allowfullscreen></iframe>
    <br><br>
    <button onclick="back()">Back</button>
</div>

<!-- GIFT 3 - Typing Message -->
<div id="gift3" class="hidden fade">
    <h2>💌 A Letter For My Baacha 💌</h2>
    <div id="typing"></div>
    <p class="big-love">I Love You Forever 💖</p>
    <button onclick="back()">Back</button>
</div>

<script>
// Background Music (romantic & soft - auto plays)
var bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.35;
bgMusic.play().catch(() => {});

// Floating cute decorations (Hello Kitty + bows)
function createDecorations() {
    const decors = ['🐱', '🎀', '💕', '🎀', '🐱', '💗'];
    setInterval(() => {
        let decor = document.createElement("div");
        decor.className = "decoration";
        decor.innerHTML = decors[Math.floor(Math.random()*decors.length)];
        decor.style.left = Math.random() * 100 + "vw";
        decor.style.animationDuration = (Math.random() * 6 + 8) + "s";
        document.getElementById("decorations").appendChild(decor);
        setTimeout(() => decor.remove(), 16000);
    }, 350);
}
createDecorations();

// Name Check
function checkName() {
    let name = document.getElementById("nameInput").value.toLowerCase().trim();
    if(name === "baacha") {
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
    } else {
        document.getElementById("error").innerText = "Not Accepted 😢 Please try again 💕";
    }
}

// YES / NO Logic
function yes() {
    document.getElementById("step2").style.display = "none";
    document.getElementById("step3").style.display = "block";
}

const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * 75 + "%";
    noBtn.style.top = Math.random() * 65 + "%";
});

// Gift Functions
function gift1() {
    document.getElementById("step3").style.display = "none";
    document.getElementById("gift1").style.display = "block";
    startSlideshow();
}

function gift2() {
    document.getElementById("step3").style.display = "none";
    document.getElementById("gift2").style.display = "block";
}

function gift3() {
    document.getElementById("step3").style.display = "none";
    document.getElementById("gift3").style.display = "block";
    startTyping();
}

function back() {
    document.getElementById("gift1").style.display = "none";
    document.getElementById("gift2").style.display = "none";
    document.getElementById("gift3").style.display = "none";
    document.getElementById("step3").style.display = "block";
}

// Slideshow (changes every 3 seconds)
let slideIndex = 0;
function startSlideshow() {
    let slides = document.getElementsByClassName("mySlides");
    for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex-1].style.display = "block";
    setTimeout(startSlideshow, 3000);
}

// Typing Love Message
const message = `My sweet baacha,\n\nEvery moment with you is so special.\nYou fill my days with happiness and my heart with love.\nI can't imagine my life without you.\n\nThank you for being mine 💖`;

function startTyping() {
    const typingElement = document.getElementById("typing");
    typingElement.innerHTML = "";
    let i = 0;
    const speed = 45;

    function type() {
        if (i < message.length) {
            typingElement.innerHTML += message.charAt(i) === "\n" ? "<br>" : message.charAt(i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}

// Hide all hidden sections initially
document.querySelectorAll('.hidden').forEach(el => el.style.display = "none");
</script>

</body>
</html>
